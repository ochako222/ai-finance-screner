[trading212]
api_key    = "your-trading212-api-key-here"
# api_secret and mcp_path are no longer required by /api/analyze/stream
# (the AI agent now receives pre-fetched data and makes no live API calls).
# They are kept for backward compatibility with other flows that may use them.
api_secret = "your-trading212-secret-here"
mcp_path   = "/absolute/path/to/trading-mcp/index.ts"

[binance]
api_key    = "your-binance-api-key-here"
api_secret = "your-binance-secret-here"

[app]
port = 7788

[ai]
model  = "claude-sonnet-4-6"
effort = "high"
